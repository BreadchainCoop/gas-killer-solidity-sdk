name: Flatten Contracts

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FOUNDRY_PROFILE: ci

jobs:
  flatten:
    name: Flatten Solidity Contracts
    runs-on: ubuntu-latest

    # Skip if the last commit only touched the generated flat/ folder
    if: |
      github.event_name == 'workflow_dispatch' || 
      !(
        contains(join(github.event.pull_request.changed_files || github.event.head_commit.added || '', ' '), 'flat/') &&
        contains(join(github.event.pull_request.changed_files || github.event.head_commit.modified || '', ' '), 'flat/') &&
        contains(join(github.event.pull_request.changed_files || github.event.head_commit.removed || '', ' '), 'flat/')
      )

    permissions: # allow the default token to push back changes
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0 # required to push commits

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      # ────────────────────────────────────────────────────────────────
      # Auto-flatten everything under src/ into the flat/ directory
      # ────────────────────────────────────────────────────────────────
      - name: Regenerate flat/ directory
        run: |
          rm -rf flat
          mkdir -p flat
          # Flatten all contracts under src/, including subdirectories (e.g. src/upgradeable/)
          find src -type f -name '*.sol' -print0 | while IFS= read -r -d '' f; do
            rel="${f#src/}"                               # e.g. upgradeable/Foo.sol
            dir="$(dirname "$rel")"                      # e.g. upgradeable
            name="$(basename "$rel" .sol)"               # e.g. Foo
            mkdir -p "flat/$dir"
            forge flatten "$f" -o "flat/$dir/${name}.flat.sol"
          done

      - name: Install solc
        run: |
          sudo add-apt-repository -y ppa:ethereum/ethereum
          sudo apt-get update
          sudo apt-get install -y solc

      # sanity-check that each flat file still compiles
      - name: Compile flattened sources
        run: |
          # Compile all flattened files recursively
          find flat -type f -name '*.sol' -print0 | while IFS= read -r -d '' f; do
            solc --optimize "$f" --via-ir --bin > /dev/null
          done

      # Commit & push the fresh flats back to the branch
      - name: Commit flattened contracts
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          file_pattern: flat/**/*.sol
          commit_message: "chore(flat): auto-flatten solidity sources 🤖"
          push_options: "--follow-tags"
